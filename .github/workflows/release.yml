name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g., v4.0.0)'
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify release inputs
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace

  build-cli:
    name: Build CLI release artifact (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: verify
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            cross: true
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
            cross: true
          - os: macos-14
            target: aarch64-apple-darwin
            cross: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            cross: false
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: ${{ matrix.cross }}
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build CLI with cross
        if: ${{ matrix.cross }}
        run: cross build --release --target ${{ matrix.target }} -p nostr-vpn-cli

      - name: Build CLI natively
        if: ${{ !matrix.cross }}
        run: cargo build --release --target ${{ matrix.target }} -p nostr-vpn-cli

      - name: Package CLI artifact
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_VERSION="${{ github.event.inputs.tag || github.ref_name }}"
          TARGET="${{ matrix.target }}"
          BIN_DIR="target/${TARGET}/release"
          rm -rf dist/nvpn
          mkdir -p dist/nvpn

          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "${BIN_DIR}/nvpn.exe" dist/nvpn/
            powershell -NoProfile -Command "Compress-Archive -Path 'dist/nvpn/*' -DestinationPath 'dist/nvpn-${RELEASE_VERSION}-${TARGET}.zip' -Force"
            exit 0
          fi

          cp "${BIN_DIR}/nvpn" dist/nvpn/
          cat > dist/nvpn/install.sh << 'INSTALL_SCRIPT'
          #!/bin/bash
          set -e

          path_contains() {
            case ":${PATH}:" in
              *":$1:"*) return 0 ;;
              *) return 1 ;;
            esac
          }

          default_install_dir() {
            if [ "$(uname -s)" = "Darwin" ] && { [ -d /opt/homebrew/bin ] || path_contains /opt/homebrew/bin; }; then
              printf '%s\n' /opt/homebrew/bin
            else
              printf '%s\n' /usr/local/bin
            fi
          }

          INSTALL_DIR="${1:-$(default_install_dir)}"
          install -d "${INSTALL_DIR}"
          install -m 755 nvpn "${INSTALL_DIR}/"
          INSTALL_SCRIPT
          chmod +x dist/nvpn/install.sh

          cat > dist/nvpn/README.txt << 'README_TXT'
          nvpn - Nostr-signaled WireGuard control plane
          ============================================

          Binary included:
            nvpn  - CLI control plane

          Quick install:
            ./install.sh
            ./install.sh ~/.local/bin
          README_TXT

          tar -czf "dist/nvpn-${TARGET}.tar.gz" -C dist nvpn
          cp "dist/nvpn-${TARGET}.tar.gz" "dist/nvpn-${RELEASE_VERSION}-${TARGET}.tar.gz"

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: |
            dist/nvpn-${{ github.event.inputs.tag || github.ref_name }}-${{ matrix.target }}.*
            dist/nvpn-${{ matrix.target }}.tar.gz
          retention-days: 7

  build-macos-app:
    name: Build native macOS app
    runs-on: macos-14
    needs: verify
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build native macOS app
        env:
          NVPN_MACOS_RUST_PROFILE: release
          NVPN_MACOS_XCODE_CONFIGURATION: Release
          NVPN_MACOS_RUST_TARGETS: aarch64-apple-darwin
        run: ./scripts/macos-build macos-build

      - name: Package native macOS app
        shell: bash
        run: |
          set -euo pipefail
          RELEASE_VERSION="${{ github.event.inputs.tag || github.ref_name }}"
          PRODUCTS_DIR="macos/.build/DerivedData/Build/Products/Release"
          APP_PATH="$(find "${PRODUCTS_DIR}" -maxdepth 2 -name 'Nostr VPN.app' -print -quit)"
          if [ -z "${APP_PATH}" ]; then
            echo "No native macOS app bundle found under ${PRODUCTS_DIR}"
            exit 1
          fi
          mkdir -p dist
          ditto -c -k --sequesterRsrc --keepParent "${APP_PATH}" "dist/nostr-vpn-${RELEASE_VERSION}-macos-arm64.zip"

      - name: Upload native macOS app
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: dist/nostr-vpn-${{ github.event.inputs.tag || github.ref_name }}-macos-arm64.zip
          retention-days: 7

  release:
    name: Create GitHub release
    if: ${{ always() && needs.verify.result == 'success' && needs.build-cli.result == 'success' }}
    needs:
      - verify
      - build-cli
      - build-macos-app
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Prepare release notes
        shell: bash
        env:
          RELEASE_REPOSITORY: ${{ github.repository }}
          RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
          MACOS_APP_RELEASED: ${{ needs.build-macos-app.result }}
        run: |
          skipped_args=()
          if [ "${MACOS_APP_RELEASED}" != "success" ]; then
            skipped_args+=(--skipped-line "macOS native app: build did not complete.")
          fi

          node scripts/render-release-notes.mjs \
            --tag "${RELEASE_TAG}" \
            --commit "${GITHUB_SHA}" \
            --asset-dir artifacts \
            --asset-base-url "https://github.com/${RELEASE_REPOSITORY}/releases/download/${RELEASE_TAG}" \
            --changelog CHANGELOG.md \
            --out release-notes.md \
            "${skipped_args[@]}"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          draft: false
          prerelease: ${{ contains(github.event.inputs.tag || github.ref_name, '-') }}
          files: artifacts/*
          body_path: release-notes.md
